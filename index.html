<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="買い物リスト">
<title>買い物リスト</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#639922;--green-dark:#3B6D11;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --bg:#F2F2F7;--card:#FFFFFF;--border:rgba(0,0,0,0.1);
  --text:#1C1C1E;--text-sub:#6C6C70;--text-hint:#AEAEB2;--surface:#F2F2F7;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1C1C1E;--card:#2C2C2E;--border:rgba(255,255,255,0.1);--text:#F2F2F7;--text-sub:#AEAEB2;--text-hint:#636366;--green-bg:#1A2E0A;--green-text:#A3C76A;--surface:#3A3A3C;}
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:16px;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ヘッダー */
.header{background:var(--card);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,44px) 16px 12px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;}
.header h1 i{color:var(--green);}
.header-btns{display:flex;align-items:center;gap:4px;}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;color:var(--text-sub);font-family:inherit;font-size:13px;display:flex;align-items:center;gap:4px;}
.icon-btn:active{background:var(--surface);}
.icon-btn i{font-size:17px;}
.clear-btn{font-size:13px;color:#FF3B30;}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sub);margin-bottom:6px;}
.prog-wrap{background:var(--bg);border-radius:99px;height:5px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .35s ease;}

/* PFC トグル */
.pfc-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:2px 0;}
.pfc-toggle-label{font-size:12px;color:var(--text-sub);display:flex;align-items:center;gap:5px;}
.pfc-toggle-label i{font-size:13px;}
.toggle-wrap{position:relative;width:42px;height:24px;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:99px;transition:background .2s;cursor:pointer;}
.toggle-wrap input:checked + .toggle-track{background:var(--green);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-wrap input:checked ~ .toggle-thumb{transform:translateX(18px);}
/* 合計PFC */
.pfc-total-row{display:none;margin-top:8px;background:var(--surface);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text-sub);}
.pfc-total-row.visible{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.pfc-total-row .label{font-weight:600;margin-right:4px;color:var(--text-sub);}
.pfc-total-tag{display:inline-flex;align-items:center;gap:2px;background:var(--card);border-radius:6px;padding:2px 7px;font-size:12px;border:0.5px solid var(--border);}
.pfc-total-tag b{font-weight:600;}

/* リスト */
.scroll{flex:1;overflow-y:auto;padding:16px 16px 220px;-webkit-overflow-scrolling:touch;}
.section{margin-bottom:20px;}
.sec-label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:0 4px 7px;display:flex;align-items:center;gap:5px;}
.sec-label i{font-size:14px;}
.card{background:var(--card);border-radius:12px;overflow:hidden;}
.item{display:flex;align-items:stretch;border-bottom:0.5px solid var(--border);min-height:54px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s;}
.item:last-child{border-bottom:none;}
.item:active{background:var(--surface);}
.item.checked{background:var(--green-bg);}
.color-bar{width:4px;min-width:4px;flex-shrink:0;}
.item-inner{display:flex;align-items:center;gap:10px;flex:1;padding:11px 12px 11px 10px;}
.circle{width:27px;height:27px;min-width:27px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.circle i{font-size:15px;color:white;opacity:0;transition:opacity .15s;}
.item.checked .circle i{opacity:1;}
.item-text{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.item-name{font-size:16px;line-height:1.3;}
.item.checked .item-name{color:var(--green-text);}
.pfc-row{display:none;font-size:11px;color:var(--text-hint);line-height:1.5;}
.pfc-row.visible{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.item.checked .pfc-row{color:var(--green-text);opacity:.7;}
.pfc-tag{font-size:11px;}
.pfc-tag span{font-weight:500;}
.pfc-nodata{display:flex;align-items:center;gap:5px;}
.pfc-scan-btn2{height:22px;padding:0 9px;background:var(--green);border:none;border-radius:99px;color:white;font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:inherit;}
.pfc-scan-btn2 i{font-size:12px;}
.pfc-manual-btn2{height:22px;padding:0 9px;background:var(--surface);border:0.5px solid var(--border);border-radius:99px;color:var(--text-sub);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:inherit;}
.pfc-manual-btn2 i{font-size:12px;}
.pfc-edit-form{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px;}
.pfc-edit-form input{width:52px;height:26px;border:0.5px solid var(--border);border-radius:6px;padding:0 6px;font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;text-align:center;}
.pfc-edit-form input:focus{border-color:var(--green);}
.pfc-edit-form label{font-size:11px;color:var(--text-sub);}
.pfc-save-btn{height:26px;padding:0 10px;background:var(--green);border:none;border-radius:6px;color:white;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.pfc-cancel-btn{height:26px;padding:0 8px;background:var(--surface);border:none;border-radius:6px;color:var(--text-sub);font-size:12px;cursor:pointer;font-family:inherit;}
.del{background:none;border:none;padding:5px;border-radius:6px;cursor:pointer;color:var(--text-hint);display:flex;align-items:center;flex-shrink:0;}
.del:active{color:#FF3B30;}
.del i{font-size:17px;}
.empty{text-align:center;color:var(--text-hint);font-size:14px;padding-top:60px;}
.empty i{font-size:48px;display:block;margin-bottom:14px;}

/* 追加パネル */
.add-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:0.5px solid var(--border);padding:10px 16px env(safe-area-inset-bottom,16px);z-index:200;}
.add-methods{display:flex;flex-direction:column;gap:8px;}
.textarea-wrap{position:relative;margin-bottom:0;}
.add-panel textarea{width:100%;min-height:58px;resize:none;border:0.5px solid var(--border);border-radius:8px;padding:9px 44px 9px 12px;font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;line-height:1.6;transition:min-height .25s ease,box-shadow .15s;}
.add-panel textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(99,153,34,.15);min-height:120px;}
.mic-btn{position:absolute;right:8px;top:10px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface);color:var(--text-sub);}
.mic-btn.listening{background:#FF3B30;color:white;animation:pulse 1s infinite;}
.mic-btn.listening-pulse{background:#FF3B30;color:white;}
.mic-btn i{font-size:17px;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.add-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;}
.mic-hint{font-size:11px;color:var(--text-hint);flex:1;}
.add-btn{height:40px;padding:0 18px;background:var(--green);border:none;border-radius:8px;color:white;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap;transition:background .15s;}
.add-btn:active{background:var(--green-dark);}
.scan-btns-row{display:flex;gap:8px;}
.scan-add-btn{flex:1;border:1.5px dashed var(--border);background:none;border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);font-family:inherit;text-align:left;transition:all .15s;}
.scan-add-btn:active{background:var(--surface);}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:430px;padding:20px 20px env(safe-area-inset-bottom,20px);transform:translateY(30px);transition:transform .25s;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.modal-title i{color:var(--green);font-size:20px;}
.modal-label{font-size:13px;color:var(--text-sub);margin-bottom:6px;}
.modal-input{width:100%;height:44px;border:0.5px solid var(--border);border-radius:8px;padding:0 12px;font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;margin-bottom:10px;}
.modal-input:focus{border-color:var(--green);}
.modal-note{font-size:11px;color:var(--text-hint);margin-bottom:16px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;}
.modal-save{flex:1;height:44px;background:var(--green);border:none;border-radius:8px;color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.modal-cancel{height:44px;padding:0 16px;background:var(--surface);border:none;border-radius:8px;color:var(--text-sub);font-size:15px;cursor:pointer;font-family:inherit;}

.toast{position:fixed;bottom:230px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(0,0,0,.72);color:white;padding:10px 18px;border-radius:99px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg);}}

/* 前回リストバナー */
.prev-banner{background:var(--card);border:0.5px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.prev-banner-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;}
.prev-banner-hd:active{background:var(--surface);}
.prev-banner-title{font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px;}
.prev-banner-title i{font-size:16px;color:#FFA726;}
.prev-banner-date{font-size:11px;color:var(--text-hint);}
.prev-banner-body{border-top:0.5px solid var(--border);padding:10px 14px 12px;}
.prev-item-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.prev-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:0.5px solid var(--border);border-radius:99px;padding:4px 10px;font-size:13px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s;}
.prev-chip.sel{background:#EAF3DE;border-color:#639922;color:#3B6D11;}
.prev-chip i{font-size:12px;}
.prev-actions{display:flex;gap:8px;}
.prev-add-btn{flex:1;height:38px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.prev-sel-btn{height:38px;padding:0 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;color:var(--text-sub);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* 前回リストモーダル（全体） */
.prev-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:flex-end;justify-content:center;}
.prev-modal.open{display:flex;}
.prev-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:80vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,16px);}
.prev-sheet-hd{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.prev-sheet-title{font-size:17px;font-weight:600;}
.prev-sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-hint);padding:4px;}
.prev-sheet-body{overflow-y:auto;flex:1;padding:10px 14px;}
.prev-cat-label{font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;padding:8px 2px 5px;}
.prev-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.prev-row:last-child{border-bottom:none;}
.prev-row:active{opacity:.7;}
.prev-check{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.prev-check.on{background:var(--green);border-color:var(--green);}
.prev-check i{font-size:13px;color:#fff;opacity:0;}
.prev-check.on i{opacity:1;}
.prev-row-name{flex:1;font-size:15px;}
.prev-row-cat{font-size:11px;color:var(--text-hint);}
.prev-sheet-foot{padding:12px 16px 0;border-top:0.5px solid var(--border);}
.prev-restore-btn{width:100%;height:46px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.scanner-modal{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;}
.scanner-modal.open{display:flex;}
#scannerVideo{width:100%;flex:1;object-fit:cover;}
.scan-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.scan-frame{width:240px;height:160px;position:relative;}
.scan-frame::before{content:'';position:absolute;top:0;left:0;width:40px;height:40px;border-top:3px solid #fff;border-left:3px solid #fff;}
.scan-frame::after{content:'';position:absolute;bottom:0;right:0;width:40px;height:40px;border-bottom:3px solid #fff;border-right:3px solid #fff;}
.scan-tr{position:absolute;top:0;right:0;width:40px;height:40px;border-top:3px solid #fff;border-right:3px solid #fff;}
.scan-bl{position:absolute;bottom:0;left:0;width:40px;height:40px;border-bottom:3px solid #fff;border-left:3px solid #fff;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#4CAF50,transparent);animation:scanline 1.8s linear infinite;}
@keyframes scanline{0%{top:0%;}100%{top:100%;}}
.scan-hint{color:rgba(255,255,255,.85);font-size:13px;margin-top:20px;text-align:center;}
.scan-status{position:absolute;bottom:env(safe-area-inset-bottom,24px);left:0;right:0;padding:10px;background:rgba(0,0,0,.6);color:#fff;font-size:13px;text-align:center;}
.scan-cancel{position:absolute;top:env(safe-area-inset-top,52px);left:16px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:99px;padding:8px 18px;font-size:14px;cursor:pointer;font-family:inherit;}

/* PFC確認シート */
.cf-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2100;display:none;align-items:flex-end;justify-content:center;}
.cf-modal.open{display:flex;}
.cf-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px env(safe-area-inset-bottom,20px);width:100%;max-width:430px;}
.cf-prod{font-size:17px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cf-sub{font-size:13px;color:var(--text-sub);margin-bottom:14px;}
.cf-pfc{display:flex;gap:8px;margin-bottom:16px;}
.cf-col{flex:1;text-align:center;border:0.5px solid var(--border);border-radius:10px;padding:10px 4px 8px;}
.cf-col label{display:block;font-size:11px;color:var(--text-hint);margin-bottom:5px;}
.cf-col input{width:100%;border:none;background:none;text-align:center;font-size:20px;font-weight:700;color:var(--text);outline:none;font-family:inherit;}
.cf-ok{width:100%;height:46px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;margin-bottom:8px;cursor:pointer;font-family:inherit;}
.cf-ng{width:100%;height:36px;background:none;border:none;color:var(--text-hint);font-size:14px;cursor:pointer;font-family:inherit;}

/* カメラ選択アクションシート */
.as-wrap{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1800;display:none;align-items:flex-end;justify-content:center;}
.as-wrap.open{display:flex;}
.as-body{background:var(--card);border-radius:16px 16px 0 0;padding:0 0 env(safe-area-inset-bottom,8px);width:100%;max-width:430px;overflow:hidden;}
.as-hd{font-size:12px;color:var(--text-hint);text-align:center;padding:14px 16px 10px;border-bottom:0.5px solid var(--border);}
.as-btn{width:100%;border:none;background:none;padding:15px 16px;font-size:15px;color:var(--text);cursor:pointer;border-bottom:0.5px solid var(--border);font-family:inherit;display:flex;align-items:center;gap:12px;text-align:left;}
.as-btn:active{background:var(--surface);}
.as-btn i{font-size:22px;color:var(--green);width:26px;flex-shrink:0;}
.as-btn small{display:block;font-size:11px;color:var(--text-hint);margin-top:2px;}
.as-btn.red{color:#FF3B30;}.as-btn.red i{color:#FF3B30;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1><i class="ti ti-shopping-cart"></i>買い物リスト</h1>
      <div class="header-btns">
        <button class="icon-btn" onclick="openPrevModal()" title="前回のリスト" id="prevBtn" style="display:none">
          <i class="ti ti-history"></i>
        </button>
        <button class="icon-btn clear-btn" onclick="clearChecked()">
          <i class="ti ti-trash"></i>完了削除
        </button>
      </div>
    </div>
    <div class="prog-row"><span id="pt">0 / 0 完了</span><span id="pp">0%</span></div>
    <div class="prog-wrap"><div class="prog-fill" id="pb" style="width:0%"></div></div>
    <div class="pfc-toggle-row">
      <div class="pfc-toggle-label"><i class="ti ti-chart-bar"></i>PFC栄養素を表示（100gあたり）</div>
      <label class="toggle-wrap">
        <input type="checkbox" id="pfcToggle" onchange="onPfcToggle()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="pfc-total-row" id="pfcTotalRow">
      <span class="label">合計</span>
      <span class="pfc-total-tag">P <b id="tP">0</b>g</span>
      <span class="pfc-total-tag">F <b id="tF">0</b>g</span>
      <span class="pfc-total-tag">C <b id="tC">0</b>g</span>
    </div>
  </div>
  <div class="scroll" id="lc"></div>
</div>

<!-- 追加パネル -->
<div class="add-panel">
  <div class="add-methods">
    <!-- テキスト入力 -->
    <div class="method-row" id="textMethod">
      <div class="textarea-wrap">
        <textarea id="inp" placeholder="食品名を入力（複数はカンマや改行でOK）&#10;例：にんじん、鶏むね肉、冷凍餃子"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声でそのまま追加">
          <i class="ti ti-microphone" id="micIcon"></i>
        </button>
      </div>
      <div class="add-bottom-row">
        <span class="mic-hint" id="micHint">🎤 マイクボタンで音声入力→即追加</span>
        <button class="add-btn" onclick="addItems()"><i class="ti ti-plus"></i> 追加</button>
      </div>
    </div>
  </div>
</div>

<!-- 前回のリスト復元モーダル -->
<div class="prev-modal" id="prevModal" onclick="if(event.target===this)closePrevModal()">
  <div class="prev-sheet">
    <div class="prev-sheet-hd">
      <div class="prev-sheet-title">🛒 前回の買い物リスト</div>
      <button class="prev-sheet-close" onclick="closePrevModal()">×</button>
    </div>
    <div class="prev-sheet-body" id="prevSheetBody"></div>
    <div class="prev-sheet-foot">
      <button class="prev-restore-btn" onclick="restoreSelected()">選択した食品を追加する</button>
    </div>

function classify(name){
  const n=name.replace(/\s/g,'');
  for(const[cat,words]of Object.entries(DICT)){for(const w of words){if(n===w||n.includes(w)||w.includes(n))return cat;}}
  for(const rule of KEYWORD_RULES){for(const kw of rule.keywords){if(n.includes(kw))return rule.cat;}}
  return "日用品・その他";
}

function showPfcForm(itemId,name,el){
  document.querySelectorAll('.pfc-edit-form').forEach(f=>f.remove());
  document.querySelectorAll('.pfc-nodata').forEach(e=>e.style.display='');
  el.style.display='none';
  const form=document.createElement('div');
  form.className='pfc-edit-form';
  form.innerHTML=
    `<label>P</label><input type="number" id="ep_${itemId}" placeholder="0.0" min="0" step="0.1">`+
    `<label>F</label><input type="number" id="ef_${itemId}" placeholder="0.0" min="0" step="0.1">`+
    `<label>C</label><input type="number" id="ec_${itemId}" placeholder="0.0" min="0" step="0.1">`+
    `<button class="pfc-save-btn" onclick="savePfcLearn('${name}',${itemId})">保存</button>`+
    `<button class="pfc-cancel-btn" onclick="render()">×</button>`;
  el.parentNode.appendChild(form);
  form.querySelector(`#ep_${itemId}`).focus();
}
function savePfcLearn(name,itemId){
  const p=parseFloat(document.getElementById('ep_'+itemId).value)||0;
  const f=parseFloat(document.getElementById('ef_'+itemId).value)||0;
  const c=parseFloat(document.getElementById('ec_'+itemId).value)||0;
  learnedPFC[name]=[p,f,c];
  saveLearnedPFC();render();
  showToast(`「${name}」のPFCを保存しました`);
}

// ─── リスト操作 ──────────────────────────────────────────
function toggle(id){const it=items.find(i=>i.id===id);if(it){it.checked=!it.checked;save();render();}}
function del(id){items=items.filter(i=>i.id!==id);save();render();}
function clearChecked(){
  const checked=items.filter(i=>i.checked);
  if(!checked.length){showToast("完了済みのアイテムがありません");return;}
  // 削除前に「前回のリスト」として保存
  const now=new Date();
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  prevList={date:dateStr, items:checked.map(i=>({name:i.name,cat:i.cat}))};
  savePrevList();
  items=items.filter(i=>!i.checked);
  save();render();
  showToast(checked.length+"件削除・前回リストに保存しました");
}

// ─── 前回リスト ───────────────────────────────────────────
let _prevSel=new Set(); // 選択中アイテムのインデックス

function openPrevModal(){
  if(!prevList){showToast("前回のリストはまだありません");return;}
  // 全選択でスタート
  _prevSel=new Set(prevList.items.map((_,i)=>i));
  renderPrevModal();
  document.getElementById('prevModal').classList.add('open');
}
function closePrevModal(){
  document.getElementById('prevModal').classList.remove('open');
}
function togglePrevItem(idx){
  if(_prevSel.has(idx)) _prevSel.delete(idx); else _prevSel.add(idx);
  renderPrevModal();
}
function renderPrevModal(){
  const body=document.getElementById('prevSheetBody');
  const grouped={};
  prevList.items.forEach((it,i)=>{
    (grouped[it.cat]=grouped[it.cat]||[]).push({...it,idx:i});
  });
  let html='';
  CAT_ORDER.forEach(cat=>{
    if(!grouped[cat]) return;
    html+=`<div class="prev-cat-label">${cat}</div>`;
    grouped[cat].forEach(it=>{
      const on=_prevSel.has(it.idx);
      html+=`<div class="prev-row" onclick="togglePrevItem(${it.idx})">
        <div class="prev-check${on?' on':''}"><i class="ti ti-check"></i></div>
        <span class="prev-row-name">${it.name}</span>
      </div>`;
    });
  });
  body.innerHTML=html;
}
function restoreSelected(){
  if(!prevList||!_prevSel.size){showToast("食品が選択されていません");return;}
  const toAdd=prevList.items.filter((_,i)=>_prevSel.has(i));
  toAdd.forEach(it=>{
    if(!items.find(x=>x.name===it.name)){
      items.push({id:nextId++,name:it.name,cat:it.cat,checked:false});
    }
  });
  save();render();
  closePrevModal();
  showToast(`${toAdd.length}品をリストに追加しました`);
}
function addItems(){
  const raw=document.getElementById('inp').value.trim();
  if(!raw)return;
  const names=[...new Set(raw.split(/[\n,、，\s]+/).map(s=>s.trim()).filter(s=>s.length>0))];
  if(!names.length)return;
  names.forEach(name=>{items.push({id:nextId++,name,cat:classify(name),checked:false});});
  document.getElementById('inp').value='';
  save();render();
  showToast(names.length+"品追加しました");
}

// ─── 音声テキスト分割 ────────────────────────────────────
// 保護ワード（分割してはいけない食品名に含まれる接続詞）
const PROTECT_WORDS=["とうもろこし","とうふ","とうがらし","とうみょう","とんかつ","とりにく","とりむね","とりもも","とりささみ","やきとり","やきそば","やきいも","やきにく","やさい","やまいも","もやし","もち","ももにく","もずく","こんにゃく","こんぶ","そとびれ"];

function splitVoiceInput(text){
  // 保護ワードをプレースホルダーに置換
  let s=text;
  const ph={};
  PROTECT_WORDS.forEach((w,i)=>{
    const p=`\x00${i}\x00`;
    ph[p]=w;
    s=s.split(w).join(p);
  });
  // 区切りパターンで分割（スペース・接続詞・句読点）
  s=s
    .replace(/[,、，。\n！？]+/g,'|')
    .replace(/それから|それと|そして|および|あとは|あと|そのほか|ほかに/g,'|')
    .replace(/\s+/g,'|')        // ← スペース・一呼吸による空白も分割
    .replace(/と/g,'|')
    .replace(/や/g,'|')
    .replace(/も/g,'|');
  // プレースホルダーを元に戻す
  for(const[p,w]of Object.entries(ph))s=s.split(p).join(w);
  return s.split('|').map(v=>v.trim()).filter(v=>v.length>0);
}

// ─── 音声入力 ────────────────────────────────────────────
let recognition=null;
let isListening=false;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast("このブラウザは音声入力に対応していません");return;
  }
  if(isListening){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=false;
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micIcon').className='ti ti-microphone-off';
    showToast("🎤 話しかけてください");
  };
  recognition.onresult=e=>{
    const transcript=e.results[e.results.length-1][0].transcript.trim();
    const parts=splitVoiceInput(transcript).filter(v=>v.length>0);
    if(!parts.length) return;
    // テキストエリアを経由せずそのままリストに追加
    parts.forEach(name=>{
      items.push({id:nextId++,name,cat:classify(name),checked:false});
    });
    save(); render();
    showToast('🎤 '+parts.join(' ・ ')+' を追加');
  };
  recognition.onerror=e=>{
    stopMic();
    if(e.error==='not-allowed')showToast("マイクの許可が必要です");
    else showToast("音声入力エラー："+e.error);
  };
  recognition.onend=()=>stopMic();
  recognition.start();
}
function stopMic(){
  if(recognition)recognition.stop();
  isListening=false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micIcon').className='ti ti-microphone';
  recognition=null;
}

  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

    banner.innerHTML=
      `<div class="prev-banner-hd" onclick="openPrevModal()">
        <div class="prev-banner-title"><i class="ti ti-history"></i>前回の買い物リスト</div>
        <div class="prev-banner-date">${prevList.date}</div>
      </div>
      <div class="prev-banner-body">
        <div style="font-size:12px;color:var(--text-sub);margin-bottom:8px">${preview}</div>
        <div class="prev-actions">
          <button class="prev-add-btn" onclick="event.stopPropagation();_prevSel=new Set(prevList.items.map((_,i)=>i));restoreSelected()">✚ 全て追加</button>
          <button class="prev-sel-btn" onclick="event.stopPropagation();openPrevModal()">選んで追加</button>
        </div>
      </div>`;
    lc.appendChild(banner);
  }

  if(!total){
    if(!prevList) lc.innerHTML='<div class="empty"><i class="ti ti-basket"></i>リストが空です<br><span style="font-size:13px;display:block;margin-top:6px">下のフォームから追加してください</span></div>';
    return;
  }
  CAT_ORDER.forEach(cat=>{
    const ci=items.filter(i=>i.cat===cat);
    if(!ci.length)return;
    const color=CAT_COLORS[cat]||'#78909C';
    const icon=CAT_ICONS[cat]||'ti-tag';
    const sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML=`<div class="sec-label" style="color:${color}"><i class="ti ${icon}" style="color:${color}"></i>${cat}</div><div class="card"></div>`;
    const card=sec.querySelector('.card');
    ci.forEach(it=>{
      const pfc=getPFC(it.name);
      const learned=!!learnedPFC[it.name];
      let pfcHtml='';
      if(pfcVisible){
        if(pfc){
          pfcHtml=`<div class="pfc-row visible">`+
            `<span class="pfc-tag">P:<span>${pfc[0]}</span>g</span>`+
            `<span class="pfc-tag">F:<span>${pfc[1]}</span>g</span>`+
            `<span class="pfc-tag">C:<span>${pfc[2]}</span>g</span>`+
            (learned?'<span style="font-size:10px;color:var(--green);margin-left:2px">✎学習済</span>':'')+
            `</div>`;
        }else{
          pfcHtml=`<div class="pfc-row visible"><div class="pfc-nodata" id="nd_${it.id}">`+
            `<button class="pfc-manual-btn2" onclick="event.stopPropagation();_asTarget={itemId:${it.id},name:'${it.name.replace(/'/g,"\\'")}'};showManualForm()"><i class="ti ti-pencil"></i> PFCを手動入力</button>`+
            `</div></div>`;
        }
      }
      const div=document.createElement('div');
      div.className='item'+(it.checked?' checked':'');
      const cStyle=it.checked?`background:${color};border-color:${color}`:`border-color:${color}60`;
      div.innerHTML=
        `<div class="color-bar" style="background:${color}"></div>`+
        `<div class="item-inner">`+
          `<div class="circle" style="${cStyle}"><i class="ti ti-check"></i></div>`+
          `<div class="item-text">`+
            `<span class="item-name">${it.name}</span>`+
            pfcHtml+
          `</div>`+
          `<button class="del" aria-label="削除"><i class="ti ti-trash"></i></button>`+
        `</div>`;
      div.querySelector('.circle').onclick=e=>{e.stopPropagation();toggle(it.id);};
      div.querySelector('.item-name').onclick=()=>toggle(it.id);
      div.querySelector('.del').onclick=e=>{e.stopPropagation();del(it.id);};
      card.appendChild(div);
    });
    lc.appendChild(sec);
  });
}
render();
</script>
</body>
</html>
